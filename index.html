<!-- Sådan indsættes en Lottie-animation -->
<div id="lottie-animation" style="width:600px; height:400px;"></div>
<script>
  lottie.loadAnimation({
    container: document.getElementById('lottie-animation'),
    renderer: 'svg',
    loop: true,
    autoplay: true,
    path: 'json/gul-ubaad.json' // stien til din Lottie-fil
  });
</script>
